<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>JusBrowse Downloads</title>
    <link rel="stylesheet" href="../theme/styles.css" />
    <style>
      /* The downloads popover BrowserView is layered above the page at the OS level.
         Its body is transparent so the rounded corners and the small gap to the right
         of the popover reveal the page below, matching Chrome's popover look. */
      html, body {
        margin: 0;
        padding: 0;
        background: transparent !important;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        display: flex;
        align-items: stretch;
        justify-content: stretch;
        padding: 6px;
      }
      .downloads-card {
        flex: 1;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 10px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--glass-2);
        backdrop-filter: blur(14px);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.42);
        padding: 12px;
        min-height: 0;
      }
      .downloads-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .downloads-card-header strong {
        color: var(--text);
        font-size: 14px;
      }
      .downloads-card-list {
        display: grid;
        gap: 10px;
        overflow-y: auto;
        padding-right: 2px;
        min-height: 0;
      }
      .downloads-empty {
        color: var(--muted);
        font-size: 12px;
        padding: 18px 4px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <section class="downloads-card" id="downloadsCard">
      <header class="downloads-card-header">
        <strong>Downloads</strong>
        <button id="closeBtn" class="settings-close" type="button">Close</button>
      </header>
      <div id="list" class="downloads-card-list"></div>
    </section>
    <script src="../components/downloadsView.js"></script>
  </body>
</html>
